services:
  # ── Dedicated Redis for SeoXpert ──────────────────────────────────────────
  seoxpert-redis:
    image: redis:7-alpine
    container_name: seoxpert-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - seoxpert_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 600m
          cpus: "0.25"

  # ── Go API Server ────────────────────────────────────────────────────────────
  seoxpert-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: seoxpert-api
    restart: unless-stopped
    ports:
      - "8090:8080"
    env_file: .env
    environment:
      APP_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # distroless has no shell/wget - health verified via: curl localhost:8090/health
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    depends_on:
      seoxpert-redis:
        condition: service_healthy

  # ── Crawler Worker ───────────────────────────────────────────────────────────
  crawler-worker:
    build:
      context: .
      dockerfile: workers/crawler/Dockerfile
    container_name: seoxpert-crawler
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: "1.5"
    depends_on:
      seoxpert-redis:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  seoxpert-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: seoxpert-frontend
    restart: unless-stopped
    ports:
      - "4013:3000"
    environment:
      NODE_ENV: production
      # Internal Docker network URL — reaches the Go API container directly
      API_URL: http://seoxpert-api:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    depends_on:
      seoxpert-redis:
        condition: service_healthy

volumes:
  seoxpert_redis_data:

# Note: Redpanda, PostgreSQL, ClickHouse are already running on the host.
# Redis is a dedicated seoxpert-redis container on port 6380 (isolated from kiit-redis on 6379).
