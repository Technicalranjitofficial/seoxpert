services:
  # ── Dedicated Redis for SeoXpert ──────────────────────────────────────────
  # Separate from the shared kiit-redis on :6379 so SeoXpert has its own
  # keyspace, memory limits, and can be wiped independently.
  seoxpert-redis:
    image: redis:7-alpine
    container_name: seoxpert-redis
    restart: unless-stopped
    ports:
      - "6380:6379"          # host:6380 → container:6379
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - seoxpert_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 600m
          cpus: "0.25"

  # ── Go API Server ────────────────────────────────────────────────────────────
  seoxpert-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: seoxpert-api
    restart: unless-stopped
    ports:
      - "8090:8080"
    env_file: .env
    environment:
      APP_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m   # Go binary — very lean
          cpus: "0.5"

    depends_on:
      seoxpert-redis:
        condition: service_healthy

  # ── Crawler Worker ───────────────────────────────────────────────────────────
  crawler-worker:
    build:
      context: .
      dockerfile: workers/crawler/Dockerfile
    container_name: seoxpert-crawler
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # chromedp needs /dev/shm for headless Chrome
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 3g     # chromedp tabs are the heavy part
          cpus: "1.5"
    depends_on:
      seoxpert-api:
        condition: service_healthy

volumes:
  seoxpert_redis_data:

# Note: Redpanda, PostgreSQL, ClickHouse are already running
# on the host — workers connect via host.docker.internal (mapped above).
# Redis is now a dedicated container on port 6380 (not the shared kiit-redis).
